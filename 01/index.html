<!DOCTYPE html>

<html>
<title>CARTAS</title>
<meta charset="utf-8"/>
<style type="text/css">
    
#workskin .letter {
  background: #fff;
  color: #000;
  padding: 15px;
  width: 65%;
  margin: 0 auto 25px;
  display: block;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  position: relative;
  text-align: justify;
}

#workskin .letter:before,
#workskin .letter:after {
  content: "";
  height: 98%;
  position: absolute;
  width: 100%;
  z-index: -1;
}

#workskin .letter:before {
  background: #fafafa;
  box-shadow: 0 0 8px rgba(0,0,0,0.2);
  left: -5px;
  top: 4px;
  transform: rotate(-2.5deg);
}

#workskin .letter:after {
  background: #f6f6f6;
  box-shadow: 0 0 3px rgba(0,0,0,0.2);
  right: -3px;
  top: 1px;
  transform: rotate(1.4deg);
}

</style>

</head>

<body>

    <div id="workskin">
       <div class="letter">
          <h1>TITULO</h1>
          <p>Há um grande desejo em mim de sempre melhorar.
Melhorar. É o que me faz feliz.
E sempre que sinto que estou aprendendo menos, que a curva de aprendizado está nivelando, ou seja o que for, então não fico muito contente.
E isso se aplica não só profissionalmente, como piloto, mas como pessoa.</p>
       </div>
    </div>
</body>
</html>
