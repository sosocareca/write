<!DOCTYPE html>

<html>

<title>TWITTER</title>
<meta charset="utf-8"/>
<style type="text/css">
 
 #workskin .twt {
  float: center;
  max-width: 20em;
  padding-left: 1em;
  padding-right: 1em;
  margin: 0em auto;
  border: 1px solid #c7c7c7;
  border-radius: 10px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", sans-serif;
}

#workskin .twt-header {
  overflow: hidden;
  margin-top: -0.5em;
  margin-bottom: -2.8em;
}

#workskin .twt-icon-container {
  float: left;
}

#workskin .twt-icon {
  border-radius: 50%;
  width: 3em;
}

#workskin .twt-iconquote {
  border-radius: 50%;
  width: 2em;
}

#workskin .twt-id {
  padding-left: 1em;
  overflow: hidden;
}

#workskin .twt-name {
  font-weight: bold;
}

#workskin .twt-name:hover {
  text-decoration: underline;
  cursor: pointer;
}

#workskin .twt-handle {
  font-size: 0.9em;
  color: #657786;
}

#workskin .twt-handle:hover {
  cursor: pointer;
}

#workskin .twt-content {
  font-size: 1em;
  margin-bottom: -1em;
}

#workskin .twt-contentquote {
  font-size: 1em;
  margin-bottom: -0.5em;
}

#workskin .twt-timestamp {
  color: #657786;
  font-size: 0.7em;
}

#workskin hr.twt-sep,
#workskin hr.twt-sep-reply {
  border: none;
  height: 1px;
  width: 100%;
  margin-top: -0.5em;
  margin-bottom: -0.5em;
  background-color: #e6e6e6;
}

#workskin .twt-stat1 {
  color: #657786;
  font-size: 0.7em;
}

#workskin .twt-quotebox {
  padding-left: 1em;
  padding-right: 1em;
  border: 1px solid #c7c7c7;
  border-radius: 10px;
}

#workskin .twt-image {
  float: center;
  max-width: 100%;
  border: 1px solid #c7c7c7;
  border-radius: 10px;
  margin-bottom: -0.5em;
}

#workskin .twt-icon-replycontainer {
  float: left;
}

#workskin .twt-replycontainer {
  padding-left: 1em;
  overflow: hidden;
}

#workskin .twt-replycontent {
  margin-top: -1.5em;
  margin-bottom: -0.5em;
}

#workskin .twt-stat2 {
  color: #657786;
  font-size: 0.7em;
  margin-top: -2em;
}

#workskin .twt-social {
  float: left;
  margin-right: 2em;
  margin-bottom: -0.5em;
}

#workskin .twt-socialimg {
  height: 12px;
  display: inline;
  padding-right: 3px;
}

#workskin .twt-hl {
  font-size: 0.9em;
  color: #1DA1F2;
}

#workskin .twt-hl:hover {
  text-decoration: underline;
  cursor: pointer;
}

</style>

</head>

<body>

    <div class="twt">

    <div class="twt-header">

        <div class="twt-icon-container">
            <img class="twt-icon" src="https://i.imgur.com/Q31haWS.jpg">
        </div>

        <div class="twt-id">
            <span class="twt-name">barry</span><br />
            <span class="twt-handle">@barrythebee</span>
        </div>
    
    </div>
    
    <div class="twt-content">According to all known laws of aviation, 
    there is no way a bee should be able to fly...🐝</div>
    
    <div class="twt-timestamp">8:14 AM · Oct 2, 2020</div>
    
    <hr class="twt-sep"><div class="twt-stat1">
    <strong>23.3K</strong> Retweets &nbsp;&nbsp; 
    <strong>924</strong> Quote Tweets &nbsp;&nbsp; 
    <strong>72.1K</strong> Likes
    </div>
    
</div>
</body>
